<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My To-Do List</title>
    <style>
        /* CSS goes here directly */
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 400px; }
        .completed { text-decoration: line-through; color: gray; }
        li { margin: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Tasks</h1>
        <input type="text" id="task-input" placeholder="New task...">
        <button id="add-btn">Add Task</button>
        <ul id="task-list"></ul>
        <p id="task-count">0 tasks left</p>
    </div>

    <script>
        // JavaScript goes here directly
        const input = document.getElementById('task-input');
        const btn = document.getElementById('add-btn');
        const list = document.getElementById('task-list');
        const countDisplay = document.getElementById('task-count');

        btn.onclick = function() {
            if (input.value.trim() === "") return;

            const li = document.createElement('li');
            li.innerHTML = `
                <span onclick="this.parentElement.classList.toggle('completed'); updateCount();">${input.value}</span>
                <button onclick="this.parentElement.remove(); updateCount();">Delete</button>
            `;
            list.appendChild(li);
            input.value = "";
            updateCount();
        };

        function updateCount() {
            const activeTasks = list.querySelectorAll('li:not(.completed)').length;
            countDisplay.innerText = activeTasks + " tasks left";
        }
    </script>
</body>
</html>
